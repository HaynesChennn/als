services:
  als:
    image: hayneschen/als:latest
    container_name: looking-glass
    restart: always
    ports:
      - "80:80"
    environment:
      # HTTP_PORT: 80
      # LISTEN_IP: 0.0.0.0
      # LOCATION: "Hong Kong, CN"
      # PUBLIC_IPV4: 1.2.3.4
      # PUBLIC_IPV6: "2001:db8::1"
      # SPEEDTEST_FILE_LIST: "1MB 10MB 100MB 1GB"
      # DISPLAY_TRAFFIC: "true"
      # ENABLE_SPEEDTEST: "true"
      # UTILITIES_PING: "true"
      # UTILITIES_SPEEDTESTDOTNET: "true"
      # UTILITIES_FAKESHELL: "true"
      # UTILITIES_IPERF3: "true"
      # UTILITIES_IPERF3_PORT_MIN: "30000"
      # UTILITIES_IPERF3_PORT_MAX: "31000"
      # SPONSOR_MESSAGE: ""

    # 如需流量监控显示真实网卡数据，改用 host 网络模式：
    # network_mode: host
    # （host 模式下删除 ports 段，端口由 HTTP_PORT 控制）
